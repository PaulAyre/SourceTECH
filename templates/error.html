{% extends "base.html" %}

{% block title %}Error - SourceTECH{% endblock %}

{% block content %}
<div class="text-center" style="max-width: 500px; margin: 0 auto; padding-top: 4rem;">
    <div class="mb-4">
        <i class="bi bi-exclamation-circle" style="font-size: 5rem; color: #dc3545;"></i>
    </div>

    <h2>Oops!</h2>

    <p class="lead">{{ message }}</p>

    <p class="text-muted">
        If you believe this is an error, please contact your account manager.
    </p>

    <p class="mt-4">
        <a href="/" class="btn btn-primary">
            <i class="bi bi-house"></i> Home
        </a>
    </p>
</div>
{% endblock %}
