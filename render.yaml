services:
  - type: web
    name: sourcetech
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: PAVTECH_API_URL
        value: https://pavtech.onrender.com
      - key: DATABASE
        value: /data/sourcetech.db
      - key: TEMP_DIR
        value: /data/temp
      # Uploaded vendor files must live on the persistent disk (/data), not the
      # ephemeral container filesystem, so they survive restarts/redeploys.
      - key: UPLOADS_DIR
        value: /data/uploads
      - key: FROM_EMAIL
        value: sourcetech@example.com
      - key: ADMIN_PASSWORD
        sync: false
      # DealTECH bridge
      - key: DEALTECH_API_URL
        value: https://dealtech.onrender.com
      - key: WEBHOOK_SECRET
        sync: false   # must match DealTECH's WEBHOOK_SECRET exactly
      - key: PUBLIC_BASE_URL
        value: https://sourcetech.onrender.com
    disk:
      name: sourcetech-data
      mountPath: /data
      sizeGB: 1
