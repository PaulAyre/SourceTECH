services:
  - type: web
    name: sourcetech
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: PAVTECH_API_URL
        value: https://portfolioapp-d6aq.onrender.com
      - key: DATABASE
        value: /data/sourcetech.db
      - key: TEMP_DIR
        value: /data/temp
      # Uploaded vendor files must live on the persistent disk (/data), not the
      # ephemeral container filesystem, so they survive restarts/redeploys.
      - key: UPLOADS_DIR
        value: /data/uploads
      # DM notification email via Resend (verified sender domain insuranceplus.com.au)
      - key: FROM_EMAIL
        value: "SourceTECH <sourcetech@insuranceplus.com.au>"
      - key: RESEND_API_KEY
        sync: false   # copied from DealTECH's Resend key on the service
      - key: ADMIN_PASSWORD
        sync: false
      # DealTECH bridge
      - key: DEALTECH_API_URL
        value: https://dealtech-m1js.onrender.com
      - key: WEBHOOK_SECRET
        sync: false   # must match DealTECH's WEBHOOK_SECRET exactly
      - key: PUBLIC_BASE_URL
        value: https://sourcetech.onrender.com
    disk:
      name: sourcetech-data
      mountPath: /data
      sizeGB: 1
